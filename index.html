<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Datepicker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <main class="page">
      <div class="datepicker">

        <!--
          CSS-only toggle trick:
          A hidden checkbox controls the calendar visibility.
          The icon button is a <label> that toggles this checkbox.
          "checked" makes the calendar open on first load.
        -->
        <input type="checkbox" id="cal-toggle" class="cal-toggle" checked />

        <!-- Input row -->
        <div class="datepicker__field">
          <input
            type="text"
            class="datepicker__input"
            placeholder="dd / mm / yyyy"
            readonly
            aria-label="Selected date"
          />
          <label for="cal-toggle" class="datepicker__icon-btn" aria-label="Toggle calendar">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8"  y1="2" x2="8"  y2="6"></line>
              <line x1="3"  y1="10" x2="21" y2="10"></line>
            </svg>
          </label>
        </div>

        <!--
          Calendar dropdown — position: absolute, taken out of normal flow,
          anchored just below the input field via top: calc(100% + 6px).
        -->
        <div class="datepicker__calendar" role="dialog" aria-label="Calendar, December 2022">

          <div class="cal__header">
            <button class="cal__nav" aria-label="Previous month">&#9664;</button>
            <span class="cal__month-year">December 2022</span>
            <button class="cal__nav" aria-label="Next month">&#9654;</button>
          </div>

          <!--
            7-column CSS Grid.
            December 2022 starts on a Thursday (column index 4),
            so 4 empty cells precede day 1.
          -->
          <div class="cal__grid">

            <!-- Day-name headers -->
            <span class="cal__day-name">S</span>
            <span class="cal__day-name">M</span>
            <span class="cal__day-name">T</span>
            <span class="cal__day-name">W</span>
            <span class="cal__day-name">T</span>
            <span class="cal__day-name">F</span>
            <span class="cal__day-name">S</span>

            <!-- Week 1 (4 empty + Thu 1, Fri 2, Sat 3) -->
            <span class="cal__day"></span>
            <span class="cal__day"></span>
            <span class="cal__day"></span>
            <span class="cal__day"></span>
            <span class="cal__day">1</span>
            <span class="cal__day">2</span>
            <span class="cal__day">3</span>

            <!-- Week 2 -->
            <span class="cal__day">4</span>
            <span class="cal__day">5</span>
            <span class="cal__day">6</span>
            <span class="cal__day">7</span>
            <span class="cal__day">8</span>
            <span class="cal__day">9</span>
            <span class="cal__day">10</span>

            <!-- Week 3 -->
            <span class="cal__day">11</span>
            <span class="cal__day">12</span>
            <span class="cal__day">13</span>
            <span class="cal__day">14</span>
            <span class="cal__day cal__day--today">15</span>
            <span class="cal__day">16</span>
            <span class="cal__day">17</span>

            <!-- Week 4 -->
            <span class="cal__day">18</span>
            <span class="cal__day">19</span>
            <span class="cal__day">20</span>
            <span class="cal__day">21</span>
            <span class="cal__day cal__day--selected">22</span>
            <span class="cal__day">23</span>
            <span class="cal__day">24</span>

            <!-- Week 5 -->
            <span class="cal__day">25</span>
            <span class="cal__day">26</span>
            <span class="cal__day">27</span>
            <span class="cal__day">28</span>
            <span class="cal__day">29</span>
            <span class="cal__day">30</span>
            <span class="cal__day">31</span>

          </div>
        </div>

      </div>
    </main>

  </body>
</html>
